<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Imposter</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: #0a0a0a;
    color: #f5f5f5;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  .app {
    width: 100%;
    max-width: 440px;
    min-height: 560px;
    display: flex;
    flex-direction: column;
  }
  h1, h2, p { margin: 0; }
  button { font-family: inherit; cursor: pointer; }
  input { font-family: inherit; }

  .stage { flex: 1; display: flex; flex-direction: column; }

  .h { font-size: 28px; font-weight: 600; letter-spacing: -0.02em; margin-bottom: 6px; }
  .sub { font-size: 15px; color: #999; margin-bottom: 28px; }

  .section { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 0.14em; margin-bottom: 10px; font-weight: 600; }

  .players { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
  .tag {
    padding: 8px 6px 8px 14px;
    background: #1a1a1a;
    border: 1px solid #262626;
    border-radius: 999px;
    font-size: 14px;
    display: flex;
    align-items: center;
    gap: 2px;
  }
  .tag button {
    background: transparent;
    border: none;
    padding: 4px 10px;
    color: #666;
    font-size: 18px;
    line-height: 1;
    border-radius: 999px;
  }
  .tag button:hover { color: #fff; }

  .add { display: flex; gap: 8px; margin-bottom: 28px; }
  .add input {
    flex: 1;
    padding: 12px 14px;
    background: #1a1a1a;
    border: 1px solid #262626;
    color: #fff;
    border-radius: 10px;
    font-size: 15px;
    outline: none;
  }
  .add input:focus { border-color: #444; }
  .add button {
    padding: 12px 20px;
    background: #1a1a1a;
    border: 1px solid #262626;
    color: #fff;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 500;
  }
  .add button:active { background: #262626; }

  .pills { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 28px; }
  .pill {
    padding: 8px 14px;
    background: transparent;
    border: 1px solid #262626;
    color: #ccc;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 500;
  }
  .pill.on {
    background: #fff;
    color: #000;
    border-color: #fff;
  }

  .btn-primary {
    width: 100%;
    padding: 17px;
    background: #fff;
    color: #000;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 600;
    transition: transform 0.1s;
  }
  .btn-primary:active { transform: scale(0.98); }
  .btn-primary:disabled { opacity: 0.3; cursor: not-allowed; }

  .btn-secondary {
    flex: 1;
    padding: 16px;
    background: #1a1a1a;
    color: #fff;
    border: 1px solid #262626;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 500;
    min-width: 130px;
  }
  .btn-secondary:active { background: #262626; }

  .rules {
    background: #131313;
    border: 1px solid #1f1f1f;
    border-radius: 12px;
    padding: 14px 16px;
    font-size: 13.5px;
    line-height: 1.65;
    color: #aaa;
    margin-top: 16px;
  }

  .card {
    background: #131313;
    border: 1px solid #1f1f1f;
    border-radius: 18px;
    padding: 40px 24px;
    text-align: center;
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 18px;
    min-height: 460px;
  }
  .card.crew { border-color: #1d3a5c; }
  .card.imposter { border-color: #5c1d1d; }

  .progress {
    font-size: 11px;
    color: #777;
    text-transform: uppercase;
    letter-spacing: 0.16em;
    font-weight: 600;
  }

  .icon-circle {
    width: 64px;
    height: 64px;
    border-radius: 999px;
    background: #1a1a1a;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
  }
  .icon-circle.crew { background: #0d2238; color: #6db3f5; }
  .icon-circle.imp { background: #2a0d0d; color: #f56d6d; }

  .name { font-size: 26px; font-weight: 600; letter-spacing: -0.01em; }

  .cat {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.16em;
    color: #888;
    font-weight: 600;
  }
  .cat.danger { color: #f56d6d; }

  .word {
    font-size: 42px;
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1.05;
    max-width: 90%;
    word-wrap: break-word;
  }
  .word.danger { color: #f56d6d; font-size: 30px; }
  .word.crew-color { color: #fff; }

  .tip {
    font-size: 14px;
    color: #888;
    max-width: 32ch;
    line-height: 1.5;
  }

  .actions {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 6px;
    justify-content: center;
    width: 100%;
  }

  .reveal-list {
    margin: 0;
    padding-left: 22px;
    font-size: 14px;
    line-height: 1.85;
    color: #aaa;
  }
  .reveal-list li { margin-bottom: 4px; }

  .info-box {
    background: #131313;
    border: 1px solid #1f1f1f;
    border-radius: 14px;
    padding: 18px 20px;
    margin-bottom: 16px;
  }

  @media (prefers-color-scheme: light) {
    body { background: #fafaf7; color: #111; }
    .tag { background: #f0eee8; border-color: #e0ddd4; }
    .tag button { color: #888; }
    .add input, .add button { background: #fff; border-color: #e0ddd4; color: #111; }
    .pill { border-color: #d8d4ca; color: #444; }
    .pill.on { background: #111; color: #fff; border-color: #111; }
    .btn-primary { background: #111; color: #fff; }
    .btn-secondary { background: #fff; border-color: #d8d4ca; color: #111; }
    .rules { background: #f0eee8; border-color: #e0ddd4; color: #555; }
    .card { background: #fff; border-color: #e0ddd4; }
    .card.crew { border-color: #b3d4f5; }
    .card.imposter { border-color: #f5b3b3; }
    .progress { color: #888; }
    .icon-circle { background: #f0eee8; }
    .icon-circle.crew { background: #e6f0fb; color: #1d6acc; }
    .icon-circle.imp { background: #fbe6e6; color: #cc1d1d; }
    .cat { color: #777; }
    .cat.danger { color: #cc1d1d; }
    .word { color: #111; }
    .word.danger { color: #cc1d1d; }
    .word.crew-color { color: #111; }
    .tip { color: #777; }
    .reveal-list { color: #555; }
    .info-box { background: #f0eee8; border-color: #e0ddd4; }
    .sub { color: #666; }
    .section { color: #666; }
  }
</style>
</head>
<body>
<div class="app">
  <div id="root" class="stage"></div>
</div>

<script>
const WORDS = {
  Movies: ['Inception','Titanic','The Dark Knight','Interstellar','The Matrix','Pulp Fiction','Joker','Parasite','Whiplash','La La Land','Spider-Man','Frozen','Avengers','Barbie','Oppenheimer','Get Out','Fight Club','Jurassic Park','3 Idiots','RRR','Avatar','Shrek','Toy Story','The Godfather'],
  Food: ['Pizza','Sushi','Tacos','Ramen','Biryani','Pad Thai','Burrito','Pho','Lasagna','Shawarma','Tikka Masala','Dim Sum','Falafel','Curry','Bagel','Dumplings','Pani Puri','Butter Chicken','Mac and Cheese','Hot Dog','Cheesecake','Croissant','Steak','Sashimi'],
  Animals: ['Lion','Penguin','Octopus','Elephant','Shark','Kangaroo','Giraffe','Panda','Koala','Cheetah','Sloth','Dolphin','Hippo','Crocodile','Eagle','Owl','Wolf','Bear','Flamingo','Cobra','Tiger','Raccoon','Bat','Squirrel'],
  Places: ['Paris','Tokyo','New York','Dubai','Las Vegas','Hawaii','Cairo','Bali','Rome','London','Barcelona','Reykjavik','Mumbai','Sydney','Istanbul','Seoul','Marrakech','Bangkok','Amsterdam','Maldives','Antarctica','Iceland','Tulum','Singapore'],
  Sports: ['Basketball','Soccer','Tennis','Cricket','Golf','Baseball','Hockey','Boxing','Skiing','Surfing','Volleyball','Rugby','Lacrosse','Wrestling','Archery','Fencing','Skateboarding','MMA','Gymnastics','Kabaddi','Formula 1','Polo','Bowling','Curling'],
  Jobs: ['Firefighter','Astronaut','Chef','Doctor','Pilot','Teacher','Lawyer','DJ','Bartender','Detective','Mortician','Surgeon','Journalist','Architect','Therapist','Lifeguard','Tattoo Artist','Magician','Plumber','Spy','Stunt Double','Voice Actor','Sommelier','Paparazzi'],
  Tech: ['TikTok','Instagram','YouTube','ChatGPT','iPhone','Tesla','Spotify','Netflix','Discord','Reddit','Snapchat','Bitcoin','WhatsApp','Twitch','Zoom','Uber','Airbnb','LinkedIn','Roblox','Minecraft','Notion','Figma','Photoshop','PlayStation'],
  Activities: ['Skydiving','Karaoke','Hiking','Camping','Dancing','Tattooing','Skating','Yoga','Pottery','Bouldering','Fishing','Kayaking','Snorkeling','Stargazing','Origami','Knitting','Meditation','Paintball','Bungee Jumping','Surfing','Cooking','Boxing','Reading','Gambling'],
  Celebrities: ['Taylor Swift','Elon Musk','LeBron James','Drake','Beyoncé','Cristiano Ronaldo','Kim Kardashian','Barack Obama','Lionel Messi','Kanye West','Rihanna','MrBeast','Tom Cruise','Snoop Dogg','Oprah','Adele','Eminem','Travis Scott','Shah Rukh Khan','Virat Kohli','Zendaya','Bad Bunny','Donald Trump','Steve Jobs'],
  Brands: ['Nike','Apple','Coca-Cola','Gucci','Ferrari','Rolex','Adidas','Lego','Disney','Starbucks','Amazon','Supreme','Louis Vuitton','BMW','Samsung','Google','IKEA','Red Bull','Pepsi','Toyota','Rolls-Royce','McDonalds','Chanel','Prada']
};

const CATS = Object.keys(WORDS);
const state = {
  players: ['om','aryan','rohan','thomas','roger','aaroh'],
  selectedCats: new Set(CATS),
  word: null, category: null, imposterIdx: null,
  phase: 'setup', turn: 0
};

const root = document.getElementById('root');
function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

function startRound() {
  if (state.players.length < 3) return;
  const cats = Array.from(state.selectedCats);
  if (cats.length === 0) return;
  state.category = pick(cats);
  state.word = pick(WORDS[state.category]);
  state.imposterIdx = Math.floor(Math.random() * state.players.length);
  state.turn = 0;
  state.phase = 'pass';
  render();
}

function el(tag, attrs) {
  const e = document.createElement(tag);
  if (attrs) {
    for (const k in attrs) {
      if (k === 'class') e.className = attrs[k];
      else if (k === 'onclick') e.onclick = attrs[k];
      else if (k === 'style') e.style.cssText = attrs[k];
      else e.setAttribute(k, attrs[k]);
    }
  }
  for (let i = 2; i < arguments.length; i++) {
    const kid = arguments[i];
    if (kid == null) continue;
    if (typeof kid === 'string') e.appendChild(document.createTextNode(kid));
    else e.appendChild(kid);
  }
  return e;
}

function render() {
  root.innerHTML = '';
  if (state.phase === 'setup') root.appendChild(renderSetup());
  else if (state.phase === 'pass') root.appendChild(renderPass());
  else if (state.phase === 'reveal') root.appendChild(renderReveal());
  else if (state.phase === 'discuss') root.appendChild(renderDiscuss());
  else if (state.phase === 'done') root.appendChild(renderDone());
  window.scrollTo(0, 0);
}

function renderSetup() {
  const wrap = el('div');
  wrap.appendChild(el('h1', {class: 'h'}, 'Imposter'));
  wrap.appendChild(el('p', {class: 'sub'}, 'One person is bluffing. Find them — or fool everyone.'));

  wrap.appendChild(el('div', {class: 'section'}, 'Players (' + state.players.length + ')'));
  const playersDiv = el('div', {class: 'players'});
  state.players.forEach((p, i) => {
    const tag = el('div', {class: 'tag'}, p);
    tag.appendChild(el('button', {'aria-label': 'Remove ' + p, onclick: () => { state.players.splice(i,1); render(); }}, '×'));
    playersDiv.appendChild(tag);
  });
  wrap.appendChild(playersDiv);

  const addRow = el('div', {class: 'add'});
  const inp = el('input', {type: 'text', placeholder: 'Add player', maxlength: 20});
  function addPlayer() {
    const v = inp.value.trim();
    if (v && !state.players.includes(v) && state.players.length < 12) {
      state.players.push(v); render();
    }
  }
  inp.addEventListener('keydown', (e) => { if (e.key === 'Enter') { e.preventDefault(); addPlayer(); }});
  addRow.appendChild(inp);
  addRow.appendChild(el('button', {onclick: addPlayer}, 'Add'));
  wrap.appendChild(addRow);

  wrap.appendChild(el('div', {class: 'section'}, 'Categories'));
  const catsDiv = el('div', {class: 'pills'});
  CATS.forEach(c => {
    const cls = 'pill' + (state.selectedCats.has(c) ? ' on' : '');
    catsDiv.appendChild(el('button', {class: cls, onclick: () => {
      if (state.selectedCats.has(c)) state.selectedCats.delete(c);
      else state.selectedCats.add(c);
      render();
    }}, c));
  });
  wrap.appendChild(catsDiv);

  const startBtn = el('button', {class: 'btn-primary', onclick: startRound}, 'Start round');
  if (state.players.length < 3 || state.selectedCats.size === 0) {
    startBtn.disabled = true;
  }
  wrap.appendChild(startBtn);

  wrap.appendChild(el('div', {class: 'rules'}, 'Each player privately sees a secret word — except the imposter, who only sees the category. Take turns saying ONE clue word that hints at the secret without giving it away. After one round, vote on who you think the imposter is. Crew wins if the imposter is caught. Imposter wins if they survive — or correctly guess the word after being caught.'));

  return wrap;
}

function renderPass() {
  const name = state.players[state.turn];
  const card = el('div', {class: 'card'});
  card.appendChild(el('div', {class: 'progress'}, 'Player ' + (state.turn + 1) + ' of ' + state.players.length));
  const ic = el('div', {class: 'icon-circle'});
  ic.textContent = '🤫';
  card.appendChild(ic);
  card.appendChild(el('div', {class: 'name'}, 'Pass to ' + name));
  card.appendChild(el('div', {class: 'tip'}, 'Hide the screen from everyone else.'));
  card.appendChild(el('button', {class: 'btn-primary', onclick: () => { state.phase = 'reveal'; render(); }}, "I'm " + name + ' — reveal'));
  return card;
}

function renderReveal() {
  const isImp = state.turn === state.imposterIdx;
  const name = state.players[state.turn];
  const card = el('div', {class: 'card ' + (isImp ? 'imposter' : 'crew')});
  card.appendChild(el('div', {class: 'progress'}, name));

  if (isImp) {
    const ic = el('div', {class: 'icon-circle imp'});
    ic.textContent = '🎭';
    card.appendChild(ic);
    card.appendChild(el('div', {class: 'word danger'}, "You're the imposter"));
    card.appendChild(el('div', {class: 'cat danger'}, 'Category — ' + state.category));
    card.appendChild(el('div', {class: 'tip'}, 'Bluff. Listen for clues. If caught, guess the word to steal the win.'));
  } else {
    const ic = el('div', {class: 'icon-circle crew'});
    ic.textContent = '👁';
    card.appendChild(ic);
    card.appendChild(el('div', {class: 'cat'}, state.category));
    card.appendChild(el('div', {class: 'word crew-color'}, state.word));
    card.appendChild(el('div', {class: 'tip'}, 'Say one hint word — never the word itself. The imposter is listening.'));
  }

  const isLast = state.turn === state.players.length - 1;
  card.appendChild(el('button', {class: 'btn-primary', onclick: () => {
    if (isLast) state.phase = 'discuss';
    else { state.turn++; state.phase = 'pass'; }
    render();
  }}, isLast ? 'Hide & start the round' : 'Hide & pass'));

  return card;
}

function renderDiscuss() {
  const wrap = el('div');
  wrap.appendChild(el('h1', {class: 'h'}, 'Everyone has a role'));
  wrap.appendChild(el('p', {class: 'sub'}, 'Time to play.'));

  const card = el('div', {class: 'info-box'});
  const ol = el('ol', {class: 'reveal-list'});
  ol.appendChild(el('li', null, 'Going clockwise, each person says ONE word that hints at the secret.'));
  ol.appendChild(el('li', null, 'No saying the secret word. Single words only — no phrases.'));
  ol.appendChild(el('li', null, 'After one full clue round, vote on the imposter (3-2-1 point at them).'));
  ol.appendChild(el('li', null, 'Tied vote? Run a second clue round, then revote.'));
  ol.appendChild(el('li', null, 'If caught, the imposter gets one chance to guess the word. Right guess = imposter wins.'));
  card.appendChild(ol);
  wrap.appendChild(card);

  const row = el('div', {class: 'actions'});
  row.appendChild(el('button', {class: 'btn-secondary', onclick: () => { state.phase = 'done'; render(); }}, 'Reveal answer'));
  row.appendChild(el('button', {class: 'btn-secondary', onclick: startRound}, 'New round'));
  wrap.appendChild(row);
  return wrap;
}

function renderDone() {
  const card = el('div', {class: 'card'});
  card.appendChild(el('div', {class: 'progress'}, 'The reveal'));
  card.appendChild(el('div', {class: 'cat'}, state.category));
  card.appendChild(el('div', {class: 'word crew-color'}, state.word));
  card.appendChild(el('div', {style: 'height:8px;'}));
  card.appendChild(el('div', {class: 'cat danger'}, 'Imposter was'));
  card.appendChild(el('div', {class: 'word danger'}, state.players[state.imposterIdx]));
  const row = el('div', {class: 'actions'});
  row.appendChild(el('button', {class: 'btn-primary', onclick: startRound}, 'New round'));
  row.appendChild(el('button', {class: 'btn-secondary', onclick: () => { state.phase = 'setup'; render(); }}, 'Setup'));
  card.appendChild(row);
  return card;
}

render();
</script>
</body>
</html>
